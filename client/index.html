<html lang="en">

    <!-- Enhanced mobile viewport settings -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    
    <!-- iOS-specific meta tags for PWA-like experience -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0EA5E9" />

    <!-- Disable auto-detection of phone numbers (prevents unwanted links) -->
    <meta name="format-detection" content="telephone=no" />
    
    <title>Letterflow — Write. Land. Earn.</title>

    <meta name="description" content="Letterflow — the newsletter platform for creators. Write. Land. Earn." />

    <!-- Open Graph -->
